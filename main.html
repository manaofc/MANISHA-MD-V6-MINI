<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANAOFC PAIR</title> </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

  <style>
    :root{
      --primary:#8a2be2;
      --secondary:#00f7ff;
      --accent:#ff2a6d;
      --dark:#0c1020;
      --darker:#080c18;
      --glass:rgba(255,255,255,0.05);
      --glass-border:rgba(255,255,255,0.1);
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      background:linear-gradient(135deg,var(--darker),var(--dark));
      font-family:'Rajdhani',sans-serif;
      color:white;
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:'';
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: radial-gradient(circle at 20% 30%, rgba(138,43,226,0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(0,247,255,0.1) 0%, transparent 50%);
      z-index:-2;
    }

    .grid{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background-image: linear-gradient(rgba(0,247,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,247,255,0.05) 1px, transparent 1px);
      background-size:30px 30px;
      perspective:1000px;
      transform-style:preserve-3d;
      z-index:-1;
    }

    .container{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
      padding:20px;
    }

    .main{
      position:relative;
      width:100%;
      max-width:380px;
    }

    .box{
      width:100%;
      padding:30px;
      position:relative;
      text-align:center;
      background:var(--glass);
      border-radius:16px;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid var(--glass-border);
      box-shadow:0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      transform:perspective(1000px) rotateY(0deg);
      overflow:hidden;
      transition:0.5s;
      z-index:1;
    }

    .box::before{
      content:'';
      position:absolute;
      top:-50%;
      left:-50%;
      width:200%;
      height:200%;
      background: linear-gradient(45deg, transparent, rgba(138,43,226,0.1), rgba(0,247,255,0.1), transparent);
      transform:rotate(45deg);
      animation: shine 6s infinite;
      z-index:-1;
    }

    @keyframes shine{
      0%{transform:translateX(-100%) rotate(45deg);}
      100%{transform:translateX(100%) rotate(45deg);}
    }

    .box:hover{
      transform:perspective(1000px) rotateY(5deg);
      box-shadow:0 15px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 15px rgba(138,43,226,0.3);
    }

    .centered-text{text-align:center; margin-bottom:20px;}

    h3{
      font-family:'Orbitron',sans-serif;
      font-size:18px;
      font-weight:500;
      color:var(--secondary);
      text-shadow:0 0 5px rgba(0,247,255,0.7);
      margin-bottom:5px;
      letter-spacing:1px;
    }

    h6{
      font-size:14px;
      font-weight:400;
      color:rgba(255,255,255,0.7);
      margin-bottom:25px;
    }

    .input-container{
      display:flex;
      background: rgba(0,0,0,0.2);
      border-radius:12px;
      padding:4px;
      gap:4px;
      width:100%;
      margin-bottom:20px;
      border:1px solid var(--glass-border);
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .input-container input{
      border-radius:8px 0 0 8px;
      background:rgba(0,0,0,0.3);
      width:100%;
      flex-basis:75%;
      padding:15px;
      border:none;
      border-right:1px solid rgba(138,43,226,0.3);
      color:white;
      font-family:'Rajdhani',sans-serif;
      font-size:16px;
      font-weight:500;
      transition:all 0.3s ease;
    }

    .input-container input::placeholder{
      color: rgba(255,255,255,0.5);
    }

    .input-container button{
      flex-basis:25%;
      padding:15px;
      border-radius:0 8px 8px 0;
      background:var(--primary);
      font-weight:700;
      letter-spacing:0.2rem;
      text-transform:uppercase;
      color:white;
      border:none;
      cursor:pointer;
      transition:all 0.3s ease;
    }

    .input-container button:hover{
      background:var(--accent);
    }

    #loading-spinner{
      display:none;
      margin-top:10px;
      color:white;
    }

    .fa-spinner{
      animation:spin 2s linear infinite;
    }

    @keyframes spin{
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #pair{
      margin-top:20px;
      font-weight:bold;
      font-size:18px;
      color:var(--secondary);
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main">
      <div class="box" id="box">
        <i class="fa fa-user fa-2x" style="margin-bottom:15px;"></i>
        <h3 class="centered-text">Link with phone number</h3>
        <h6>🔢 Enter your number with country code.</h6>

        <div class="input-container">
          <input type="number" id="number" placeholder="+9475xxxxxx">
          <button id="submit">Submit</button>
        </div>

        <!-- Loading Spinner -->
        <div id="loading-spinner">
          <i class="fas fa-spinner fa-spin fa-2x"></i>
        </div>

        <!-- Code Output -->
        <main id="pair"></main>
      </div>
    </div>
  </div>

  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let text = document.getElementById("copy").innerText;
      let obj = document.getElementById("copy");
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerText = "✔️ COPIED";
      obj.style = "color:red;font-weight:bold";
      setTimeout(() => {
        obj.innerText = text;
        obj.style = "color:white;font-weight:bold";
      }, 500);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<span style="color:red;font-weight:bold">❗Enter your whatsapp number with country code.</span><br><br>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<span style="color:red;font-weight:bold">❗Invalid number format. Please try again.</span><br><br>';
      } else {
        const bc = c.value.replace(/[^0-9]/g, "");
        let bb = "";
        const cc = bc.split('');
        cc.forEach((num, i) => {
          bb += num;
          if (i === 2 || i === 7) bb += " ";
        });
        c.type = "text";
        c.value = "+" + bb;
        c.style = "color:white;font-size:20px";

        // Show spinner
        document.getElementById("loading-spinner").style.display = "block";
        a.innerHTML = ''; // clear previous

        try {
          let { data } = await axios(`/code?number=${bc}`);
          let code = data.code || "❗ Service Unavailable";
          a.innerHTML = '<span id="copy" onclick="Copy()" style="color:red;font-weight:bold; cursor:pointer">CODE: <span style="color:white;font-weight:bold">' + code + '</span></span>';
        } catch (err) {
          a.innerHTML = '<span style="color:red;font-weight:bold">❗ Error fetching code.</span>';
        } finally {
          document.getElementById("loading-spinner").style.display = "none";
        }
      }
    });
  </script>
</body>
</html>
